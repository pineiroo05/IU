<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./css/IU.css">
    <title>Entrega de Julio</title>

    <script src="menu_entidades.js"></script>

    <script src="js/entidades/characteristic_Class.js"></script>
    <script src="js/entidades/project_Class.js"></script>

    <script src="js/pruebas/analysis_preparation_tests.js"></script>
    <script src="js/pruebas/analysis_preparation_TestSubmit.js"></script>
    <script src="js/pruebas/characteristic_tests.js"></script>
    <script src="js/pruebas/characteristic_TestSubmit.js"></script>
    <script src="js/pruebas/project_tests.js"></script>
    <script src="js/pruebas/project_TestSubmit.js"></script>

    <script src="js/Validations_Class.js"></script>
    <script src="js/ValidateFieldsForm_Class.js"></script>
    <script src="js/Gestor_Class.js"></script>
    <script src="js/TestForm_Class.js"></script>

    <script src="js/entidades/project_estructura.js"></script>

</head>
<body>
    <header id="cabecera">
        <h1>Sistema de pruebas</h1>
        <a href="API.html" id="enlace_api" title="Ver documentacion API">
            <img src="img/api.png" alt="API" class="icono_api">
        </a>
    </header>
    <nav id="menu">
        <button id="icono_menu" onclick="document.getElementById('listaMenu').classList.toggle('visible')">MENU</button>
        <ul id="listaMenu"></ul>
    </nav>
    <!--Para lo de la generacion dinamica-->
    <script>
        const lista=document.getElementById('listaMenu');
        menu_entidades.forEach(function(entidad){
            const li=document.createElement('li');
            li.textContent=entidad.toUpperCase().replace('_',' ');
            li.onclick=function (){new Gestor().atenderMenu(entidad);};
            lista.appendChild(li);
        });
    </script>
    <main id="zona_trabajo">
        <div id="zona_modal"></div> <!--Recordatorio de q esto es para errores. Se tiene q abrir una ventana modal de error-->
        <div id="gestion_entidad"></div>
    </main>

    <footer id="pie_index">
        <p>Entrega Julio. Enrique Piñeiro López</p>
    </footer>
</body>
</html>
